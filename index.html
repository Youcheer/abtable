<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Generator - Theme Switcher</title>
    <!-- Include html2canvas for downloading the table as an image -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:ital,wght@0,400;0,700;1,700&family=Roboto:wght@500;700;900&family=Teko:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables for Light/Dark Theme Switching */
        :root {
            /* Table Customization Variables */
            --table-font-size: 1.1em;
            --heading-font-size: 2.2em;
            --table-font-family: 'Roboto', sans-serif;
            --table-font-weight: 700;
            --cell-pad-y: 12px;
            --cell-pad-x: 14px;
            --border-thickness: 1px;
            
            /* Dark Theme (Default) Colors */
            --bg-main: radial-gradient(circle at top, #2a0000 0%, #000000 70%);
            --bg-panel: rgba(30, 30, 30, 0.8);
            --bg-info: rgba(0, 0, 0, 0.6);
            --bg-input: rgba(0, 0, 0, 0.8);
            --text-main: #ffffff;
            --text-muted: #cccccc;
            --text-input: #00ff00;
            --border-input: #444444;
            --border-panel: rgba(255, 255, 255, 0.1);
            
            --capture-bg: #050000;
            --table-bg: #000000;
            --row-bg: #050505;
            --code-color: #ffcc00;
            --odds-color: #ffcc00;
            --match-color: #ffffff;
            
            --header-red-bg: #a00000;
            --inner-border-color: #444444;
            --outer-border-color: #ff0000;
            --shadow-color: rgba(255, 0, 0, 0.6);
            --title-header-bg: #000000;
            --title-header-text: #ffffff;
            --black-header-bg: #000000;
            --black-header-text: #ffffff;
        }

        /* Light Theme Colors */
        body.light-mode {
            --bg-main: #f4f7f6;
            --bg-panel: #ffffff;
            --bg-info: #f9f9f9;
            --bg-input: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --text-input: #b30000;
            --border-input: #cccccc;
            --border-panel: #e0e0e0;
            
            --capture-bg: #ffffff;
            --table-bg: #ffffff;
            --row-bg: #fafafa;
            --code-color: #b30000;
            --odds-color: #0066cc;
            --match-color: #333333;
            
            --header-red-bg: #cc0000;
            --inner-border-color: #cccccc;
            --outer-border-color: #990000;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --title-header-bg: #f0f0f0;
            --title-header-text: #111111;
            --black-header-bg: #333333;
            --black-header-text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: var(--bg-main);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-main);
            transition: background 0.3s ease, color 0.3s ease;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }
        
        /* Theme Toggle Button */
        .theme-toggle-wrapper {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .btn-theme-toggle {
            background: var(--bg-panel);
            color: var(--text-main);
            border: 1px solid var(--border-input);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px var(--shadow-color);
            transition: all 0.3s ease;
        }

        .btn-theme-toggle:hover {
            transform: translateY(-2px);
        }

        .input-section {
            background: var(--bg-panel);
            border: 1px solid var(--border-panel);
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        
        .input-section h2 {
            margin-bottom: 15px;
            color: var(--text-main);
            font-size: 1.5em;
            font-family: 'Oswald', sans-serif;
            letter-spacing: 1px;
        }
        
        .input-section p {
            color: var(--text-muted);
            margin-bottom: 15px;
            font-size: 0.95em;
        }
        
        .info-box {
            background: var(--bg-info);
            border-left: 4px solid var(--header-red-bg);
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            font-size: 0.9em;
        }
        
        .info-box code {
            background: var(--bg-table);
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
            color: var(--code-color);
        }
        
        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            background: var(--bg-input);
            color: var(--text-input);
            border: 1px solid var(--border-input);
            border-radius: 5px;
            font-family: monospace;
            font-size: 0.9em;
            font-weight: bold;
            resize: vertical;
        }
        
        textarea:focus {
            outline: none;
            border-color: var(--header-red-bg);
            box-shadow: 0 0 10px var(--shadow-color);
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-family: 'Oswald', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        
        .btn-generate {
            background: linear-gradient(to bottom, var(--header-red-bg), #800000);
            color: white;
            flex: 1;
        }
        
        .btn-generate:hover {
            opacity: 0.9;
        }
        
        .btn-clear {
            background: var(--border-input);
            color: var(--text-main);
        }
        
        .btn-clear:hover {
            opacity: 0.8;
        }

        .btn-download-png {
            background: #0066cc;
            color: white;
        }

        .btn-download-jpg {
            background: #e68a00;
            color: white;
        }
        
        .error, .success {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
            font-weight: bold;
        }
        
        .error { background: #f8d7da; color: #721c24; border-left: 4px solid #f5c6cb; }
        .success { background: #d4edda; color: #155724; border-left: 4px solid #c3e6cb; }
        .show { display: block; }
        
        .table-section {
            display: none;
            margin-bottom: 50px;
        }
        
        .table-section.active {
            display: block;
        }

        /* Customization Controls UI */
        .custom-controls {
            background: var(--bg-panel);
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            border: 1px solid var(--border-panel);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-size: 0.85em;
            color: var(--text-muted);
            font-family: 'Roboto', sans-serif;
            font-weight: bold;
        }

        .control-group input[type="range"] {
            width: 100%;
            accent-color: var(--header-red-bg);
        }

        .control-group select, .control-group input[type="color"] {
            padding: 5px;
            background: var(--bg-input);
            color: var(--text-main);
            border: 1px solid var(--border-input);
            border-radius: 3px;
            font-family: inherit;
            width: 100%;
            cursor: pointer;
        }

        .control-group input[type="color"] {
            height: 35px;
            padding: 2px;
        }

        .hint-text {
            color: var(--text-muted);
            font-size: 0.9em;
            text-align: center;
            margin-top: 15px;
            margin-bottom: 10px;
            font-family: 'Roboto', sans-serif;
        }
        
        /* Capture area */
        #captureArea {
            background: var(--capture-bg);
            padding: 15px 15px 25px 15px; 
            margin: 0 auto;
            border-radius: 5px;
            resize: horizontal; 
            overflow: auto;
            min-width: 600px;
            max-width: 100%;
            border: 2px dashed var(--border-input); 
        }

        #captureArea.downloading {
            border: none;
            resize: none;
            overflow: visible !important;
            padding: 15px; 
        }

        /* Added for individual column resizing */
        .col-resize {
            resize: horizontal;
            overflow: hidden;
            min-width: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        #captureArea.downloading .col-resize {
            resize: none;
            overflow: visible !important;
        }

        /* Table wrapper */
        .table-wrapper {
            border: var(--border-thickness) solid var(--outer-border-color);
            box-shadow: 0 0 15px var(--shadow-color);
            border-radius: 4px;
            overflow: hidden;
            height: auto;
        }

        table {
            width: 100%;
            height: auto; 
            border-collapse: collapse;
            font-family: var(--table-font-family);
            /* Changed to auto to allow individual column resizing */
            table-layout: auto; 
            background: #000;
        }
        
        th, td {
            border: var(--border-thickness) solid var(--inner-border-color); 
            text-align: center;
            padding: var(--cell-pad-y) var(--cell-pad-x); 
            vertical-align: middle; 
            font-size: var(--table-font-size);
            font-weight: var(--table-font-weight);
        }

        th {
            white-space: nowrap; 
            font-family: 'Oswald', sans-serif; 
        }
        
        /* Header Styling */
        .title-header {
            font-size: var(--heading-font-size); 
            font-style: italic;
            font-weight: 700;
            background: var(--title-header-bg);
            color: var(--title-header-text);
            text-shadow: 0 0 5px rgba(255,255,255,0.2);
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: var(--cell-pad-y); 
            border-bottom: calc(var(--border-thickness) * 2) solid var(--inner-border-color) !important;
            cursor: pointer;
        }
        
        .red-header {
            background: linear-gradient(to bottom, var(--header-red-bg), rgba(0,0,0,0.3));
            background-color: var(--header-red-bg);
            color: white;
            font-weight: 700;
            letter-spacing: 1px;
            padding: calc(var(--cell-pad-y) * 0.8) var(--cell-pad-x); 
        }
        
        .black-header {
            background: var(--black-header-bg);
            color: var(--black-header-text);
            font-weight: 700;
            padding: calc(var(--cell-pad-y) * 0.8) var(--cell-pad-x);
        }
        
        /* Body Styling */
        tbody tr {
            background: var(--row-bg);
        }
        
        .match-cell {
            text-align: left;
            padding-left: 20px;
            font-weight: var(--table-font-weight);
            font-size: var(--table-font-size);
            white-space: normal;
            line-height: 1.4;
            color: var(--match-color);
            font-family: var(--table-font-family);
        }
        
        .code-cell {
            color: var(--code-color); 
            font-weight: var(--table-font-weight);
            font-size: var(--table-font-size);
        }

        .date-time-cell {
            color: var(--match-color); 
            font-weight: var(--table-font-weight);
            font-size: var(--table-font-size);
        }

        .odds {
            color: var(--odds-color); 
            font-weight: var(--table-font-weight);
            font-size: var(--table-font-size);
        }

        .controls {
            margin-bottom: 15px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        
    </style>
</head>
<body>
    <div class="container">
        
        <!-- Theme Toggle Button -->
        <div class="theme-toggle-wrapper">
            <button class="btn-theme-toggle" id="themeToggleBtn" onclick="toggleTheme()">
                ☀️ Switch to Light Theme
            </button>
        </div>

        <!-- Data Input Section -->
        <div class="input-section">
            <h2>📋 Data Input</h2>
            
            <div class="error" id="errorMessage"></div>
            <div class="success" id="successMessage"></div>
            
            <p><strong>Copy your data below and paste it here:</strong></p>
            
            <div class="info-box">
                <p><strong>Format (7 Columns):</strong> CODE | DATE | TIME | MATCH | 1 | X | 2</p>
                <p><strong>Format (6 Columns):</strong> CODE | DATE | TIME | MATCH | 1 | 2</p>
            </div>
            
            <textarea id="dataInput" placeholder="3332|18.06|01:30|England vs Croatia|1.74|3.70|4.90
0564|27.06|00:30|France vs Norway|4.40|3.65|1.83
1325|14.06|03:30|Brazil vs Morocco|1.65|3.85|5.40
4314|28.06|05:00|Portugal vs Colombia|3.50|3.35|2.15
0303|27.06|05:30|Spain vs Uruguay|5.60|4.10|1.60
1924|16.06|00:30|Belgium vs Egypt|1.70|3.85|5.00
4513|22.06|22:30|Argentina vs Austria|1.65|3.85|5.40"></textarea>
            
            <div class="button-group">
                <button class="btn btn-generate" onclick="generateTable()">🔄 Generate Table</button>
                <button class="btn btn-clear" onclick="clearData()">Clear</button>
            </div>
        </div>
        
        <!-- Table Section -->
        <div class="table-section" id="tableSection">
            
            <!-- Advanced Customization Controls -->
            <div class="custom-controls">
                <!-- Heading Font Size -->
                <div class="control-group">
                    <label for="headingSizeSlider">Heading Size</label>
                    <input type="range" id="headingSizeSlider" min="1.0" max="5.0" step="0.1" value="2.2">
                </div>
                <!-- Font Size (Max increased to 2.5) -->
                <div class="control-group">
                    <label for="fontSizeSlider">Font Size</label>
                    <input type="range" id="fontSizeSlider" min="0.8" max="2.5" step="0.05" value="1.1">
                </div>
                <!-- Vertical Padding (Height) -->
                <div class="control-group">
                    <label for="padYSlider">Row Padding (Vertical)</label>
                    <input type="range" id="padYSlider" min="2" max="30" step="1" value="12">
                </div>
                <!-- Horizontal Padding (Width Spacing) -->
                <div class="control-group">
                    <label for="padXSlider">Cell Padding (Horizontal)</label>
                    <input type="range" id="padXSlider" min="2" max="30" step="1" value="14">
                </div>
                <!-- Border Thickness -->
                <div class="control-group">
                    <label for="borderSlider">Border Thickness</label>
                    <input type="range" id="borderSlider" min="0" max="5" step="1" value="1">
                </div>
                <!-- Inner Border Color -->
                <div class="control-group">
                    <label for="innerBorderColorPicker">Cell Border Color</label>
                    <input type="color" id="innerBorderColorPicker" value="#444444">
                </div>
                <!-- Outer Border Color -->
                <div class="control-group">
                    <label for="outerBorderColorPicker">Main Border Color (Glow)</label>
                    <input type="color" id="outerBorderColorPicker" value="#ff0000">
                </div>
                <!-- Header Color -->
                <div class="control-group">
                    <label for="headerColorPicker">Header Color</label>
                    <input type="color" id="headerColorPicker" value="#a00000">
                </div>
                <!-- Font Style -->
                <div class="control-group">
                    <label for="fontFamilySelect">Font Style</label>
                    <select id="fontFamilySelect">
                        <option value="'Roboto', sans-serif">Roboto (Normal)</option>
                        <option value="'Oswald', sans-serif">Oswald (Sporty)</option>
                        <option value="'Anton', sans-serif">Anton (Very Bold)</option>
                        <option value="'Teko', sans-serif">Teko (Tall & Bold)</option>
                        <option value="'Arial Black', sans-serif">Arial Black (Classic Bold)</option>
                    </select>
                </div>
                <!-- Font Weight -->
                <div class="control-group">
                    <label for="fontWeightSelect">Font Weight</label>
                    <select id="fontWeightSelect">
                        <option value="500">Normal (500)</option>
                        <option value="700" selected>Bold (700)</option>
                        <option value="900">Extra Bold (900)</option>
                    </select>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-download-jpg" onclick="downloadImage('jpg')">⬇️ Download JPG</button>
                <button class="btn btn-download-png" onclick="downloadImage('png')">⬇️ Download PNG</button>
            </div>
            
            <div class="hint-text">💡 Drag the bottom-right corner of the table area to adjust width.</div>

            <!-- Capture area -->
            <div id="captureArea">
                <div class="table-wrapper">
                    <table id="dataTable">
                        <colgroup id="tableColgroup">
                            <!-- Colgroup -->
                        </colgroup>
                        <thead id="tableHead">
                            <!-- Headers -->
                        </thead>
                        <tbody id="tableBody">
                            <!-- Data -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 📌 Theme Toggle Logic (Light / Dark mode switcher)
        function toggleTheme() {
            const body = document.body;
            const themeBtn = document.getElementById('themeToggleBtn');
            
            body.classList.toggle('light-mode');
            
            // Update button text based on current theme
            if (body.classList.contains('light-mode')) {
                themeBtn.innerHTML = '🌙 Switch to Dark Theme';
            } else {
                themeBtn.innerHTML = '☀️ Switch to Light Theme';
            }
        }

        // UI Customization Bindings
        document.getElementById('headingSizeSlider').addEventListener('input', function(e) {
            document.body.style.setProperty('--heading-font-size', e.target.value + 'em');
        });
        document.getElementById('fontSizeSlider').addEventListener('input', function(e) {
            document.body.style.setProperty('--table-font-size', e.target.value + 'em');
        });
        document.getElementById('padYSlider').addEventListener('input', function(e) {
            document.body.style.setProperty('--cell-pad-y', e.target.value + 'px');
        });
        document.getElementById('padXSlider').addEventListener('input', function(e) {
            document.body.style.setProperty('--cell-pad-x', e.target.value + 'px');
        });
        document.getElementById('borderSlider').addEventListener('input', function(e) {
            document.body.style.setProperty('--border-thickness', e.target.value + 'px');
        });
        document.getElementById('headerColorPicker').addEventListener('input', function(e) {
            document.body.style.setProperty('--header-red-bg', e.target.value);
        });
        document.getElementById('innerBorderColorPicker').addEventListener('input', function(e) {
            document.body.style.setProperty('--inner-border-color', e.target.value);
        });
        document.getElementById('outerBorderColorPicker').addEventListener('input', function(e) {
            document.body.style.setProperty('--outer-border-color', e.target.value);
        });

        document.getElementById('fontFamilySelect').addEventListener('change', function(e) {
            document.body.style.setProperty('--table-font-family', e.target.value);
        });
        document.getElementById('fontWeightSelect').addEventListener('change', function(e) {
            document.body.style.setProperty('--table-font-weight', e.target.value);
        });

        // 📌 Country Flags Mapping Dictionary
        const flagMap = {
            'england': 'gb-eng', 'croatia': 'hr', 'france': 'fr', 'norway': 'no',
            'brazil': 'br', 'morocco': 'ma', 'portugal': 'pt', 'colombia': 'co',
            'spain': 'es', 'uruguay': 'uy', 'belgium': 'be', 'egypt': 'eg',
            'argentina': 'ar', 'austria': 'at', 'germany': 'de', 'italy': 'it', 
            'netherlands': 'nl', 'switzerland': 'ch', 'usa': 'us', 'mexico': 'mx', 
            'japan': 'jp', 'south korea': 'kr', 'wales': 'gb-wls', 'scotland': 'gb-sct', 
            'denmark': 'dk', 'sweden': 'se', 'poland': 'pl', 'senegal': 'sn',
            'cameroon': 'cm', 'canada': 'ca', 'ghana': 'gh', 'australia': 'au',
            'sri lanka': 'lk', 'india': 'in', 'pakistan': 'pk', 'bangladesh': 'bd',
            'south africa': 'za', 'new zealand': 'nz', 'ivory coast': 'ci', "cote d'ivoire": 'ci'
        };

        // 📌 Function to format match string with Flags
        function formatMatchWithFlags(matchText) {
            let team1 = "", team2 = "", sep = "";
            
            if (matchText.includes(" vs ")) {
                [team1, team2] = matchText.split(" vs ");
                sep = "vs";
            } else if (matchText.includes("-")) {
                [team1, team2] = matchText.split("-");
                sep = "-";
            } else {
                return matchText;
            }

            team1 = team1.trim();
            team2 = team2.trim();

            const getFlagHTML = (team) => {
                const key = team.toLowerCase();
                if (flagMap[key]) {
                    // crossorigin="anonymous" is crucial for html2canvas to save the image successfully
                    return `<img src="https://flagcdn.com/24x18/${flagMap[key]}.png" style="width:24px; height:18px; border-radius:2px; box-shadow:0 0 3px rgba(0,0,0,0.5); object-fit:cover;" crossorigin="anonymous">`;
                }
                return '';
            };

            const flag1 = getFlagHTML(team1);
            const flag2 = getFlagHTML(team2);

            return `
                <div style="display:flex; align-items:center; gap:8px;">${flag1} <span>${team1}</span></div>
                <div style="margin-left: ${flag1 ? '32px' : '0'}; color: var(--text-muted, #888); font-size: 0.9em; margin-top:3px; margin-bottom:3px; font-style:italic;">${sep}</div>
                <div style="display:flex; align-items:center; gap:8px;">${flag2} <span>${team2}</span></div>
            `;
        }

        // Generate Table Logic
        function generateTable() {
            const input = document.getElementById('dataInput').value.trim();
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            
            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');
            
            if (!input) {
                errorDiv.textContent = '❌ Please paste your data first!';
                errorDiv.classList.add('show');
                return;
            }
            
            const lines = input.split('\n').filter(line => line.trim());
            const tbody = document.getElementById('tableBody');
            const thead = document.getElementById('tableHead');
            const colgroup = document.getElementById('tableColgroup');
            
            tbody.innerHTML = '';
            
            let validRows = 0;
            let hasX = true; 
            
            // Check number of columns
            for (const line of lines) {
                const testCols = line.split('|').map(col => col.trim());
                if (testCols.length === 6) {
                    hasX = false;
                    break;
                } else if (testCols.length === 7) {
                    hasX = true;
                    break;
                }
            }

            // Create Colgroup
            if (hasX) {
                colgroup.innerHTML = `
                    <col style="width: 12%;">
                    <col style="width: 12%;">
                    <col style="width: 12%;">
                    <col style="width: 34%;"> 
                    <col style="width: 10%;">
                    <col style="width: 10%;">
                    <col style="width: 10%;">
                `;
            } else {
                colgroup.innerHTML = `
                    <col style="width: 14%;">
                    <col style="width: 14%;">
                    <col style="width: 14%;">
                    <col style="width: 38%;"> 
                    <col style="width: 10%;">
                    <col style="width: 10%;">
                `;
            }

            // Create Headers
            const titleText = hasX ? "EUROPEAN TOP LEAGUES" : "WORLD - IPL";
            const colspanVal = hasX ? 7 : 6;
            
            let theadHTML = `
                <tr>
                    <th colspan="${colspanVal}" class="title-header" contenteditable="true" id="mainTitle" title="Click to edit">${titleText}</th>
                </tr>
                <tr>
                    <th class="red-header"><div class="col-resize">CODE</div></th>
                    <th class="red-header"><div class="col-resize">DATE</div></th>
                    <th class="red-header"><div class="col-resize">TIME</div></th>
                    <th class="red-header"><div class="col-resize">MATCH</div></th>
                    <th class="black-header"><div class="col-resize">1</div></th>
                    ${hasX ? '<th class="black-header"><div class="col-resize">X</div></th>' : ''}
                    <th class="black-header"><div class="col-resize">2</div></th>
                </tr>
            `;
            
            thead.innerHTML = theadHTML;
            
            // Create Rows
            for (const line of lines) {
                const columns = line.split('|').map(col => col.trim());
                const row = document.createElement('tr');
                
                if (hasX && columns.length === 7) {
                    const [code, date, time, match, odd1, oddx, odd2] = columns;
                    const formattedMatch = formatMatchWithFlags(match);
                    
                    row.innerHTML = `
                        <td class="code-cell">${code}</td>
                        <td class="date-time-cell">${date}</td>
                        <td class="date-time-cell">${time}</td>
                        <td class="match-cell">${formattedMatch}</td>
                        <td class="odds">${odd1}</td>
                        <td class="odds">${oddx}</td>
                        <td class="odds">${odd2}</td>
                    `;
                    tbody.appendChild(row);
                    validRows++;
                } else if (!hasX && columns.length === 6) {
                    const [code, date, time, match, odd1, odd2] = columns;
                    const formattedMatch = formatMatchWithFlags(match);

                    row.innerHTML = `
                        <td class="code-cell">${code}</td>
                        <td class="date-time-cell">${date}</td>
                        <td class="date-time-cell">${time}</td>
                        <td class="match-cell">${formattedMatch}</td>
                        <td class="odds">${odd1}</td>
                        <td class="odds">${odd2}</td>
                    `;
                    tbody.appendChild(row);
                    validRows++;
                }
            }
            
            if (validRows === 0) {
                errorDiv.textContent = '❌ No valid data found!';
                errorDiv.classList.add('show');
                return;
            }
            
            document.getElementById('tableSection').classList.add('active');
            successDiv.textContent = `✅ Generated ${validRows} rows successfully!`;
            successDiv.classList.add('show');
            
            setTimeout(() => {
                document.getElementById('tableSection').scrollIntoView({ behavior: 'smooth' });
            }, 100);
        }
        
        // Clear Data
        function clearData() {
            document.getElementById('dataInput').value = '';
            document.getElementById('tableBody').innerHTML = '';
            document.getElementById('tableSection').classList.remove('active');
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('successMessage').classList.remove('show');
        }

        // Download Image
        function downloadImage(format) {
            const captureArea = document.getElementById('captureArea');
            const titleHeader = document.getElementById('mainTitle');
            
            if(titleHeader) titleHeader.blur();

            const prevScrollY = window.scrollY;
            document.documentElement.style.scrollBehavior = 'auto'; 
            window.scrollTo(0, 0);

            captureArea.classList.add('downloading');
            
            // Check current theme background
            const isLightMode = document.body.classList.contains('light-mode');
            const captureBgColor = isLightMode ? '#ffffff' : '#050000';

            setTimeout(() => {
                html2canvas(captureArea, {
                    backgroundColor: captureBgColor, // Dynamic background based on theme
                    scale: 4, // High Resolution
                    scrollY: 0,
                    useCORS: true
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `League_Table.${format}`;
                    
                    if (format === 'jpg') {
                        link.href = canvas.toDataURL('image/jpeg', 1.0);
                    } else {
                        link.href = canvas.toDataURL('image/png');
                    }
                    
                    link.click();

                    captureArea.classList.remove('downloading');
                    window.scrollTo(0, prevScrollY);
                    document.documentElement.style.scrollBehavior = ''; 
                });
            }, 150);
        }
    </script>
</body>
</html>
