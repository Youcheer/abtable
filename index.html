<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Generator - Glass Theme</title>
    <!-- Include html2canvas for downloading the table as an image -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:ital,wght@0,400;0,700;1,700&family=Roboto:wght@500;700;900&family=Teko:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Styles */
        :root {
            /* CSS Variables for Customization */
            --table-font-size: 1.1em;
            --table-font-family: 'Roboto', sans-serif;
            --table-font-weight: 700;
            --cell-pad-y: 12px;
            --cell-pad-x: 14px;
            --border-thickness: 1px;
            --header-red-bg: #a00000;
            --inner-border-color: #444444;
            --outer-border-color: #ff0000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: #111;
            background: radial-gradient(circle at top, #2a0000 0%, #000000 70%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .input-section {
            background: rgba(30, 30, 30, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }
        
        .input-section h2 {
            margin-bottom: 15px;
            color: #fff;
            font-size: 1.5em;
            font-family: 'Oswald', sans-serif;
            letter-spacing: 1px;
        }
        
        .input-section p {
            color: #ccc;
            margin-bottom: 15px;
            font-size: 0.95em;
        }
        
        .info-box {
            background: rgba(0, 0, 0, 0.6);
            border-left: 4px solid #cc0000;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            font-size: 0.9em;
        }
        
        .info-box code {
            background: #111;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
            color: #ffcc00;
        }
        
        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.8);
            color: #00ff00;
            border: 1px solid #444;
            border-radius: 5px;
            font-family: monospace;
            font-size: 0.9em;
            font-weight: bold;
            resize: vertical;
        }
        
        textarea:focus {
            outline: none;
            border-color: #ff0000;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-family: 'Oswald', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        
        .btn-generate {
            background: linear-gradient(to bottom, #cc0000, #800000);
            color: white;
            flex: 1;
        }
        
        .btn-generate:hover {
            background: linear-gradient(to bottom, #ff0000, #990000);
        }
        
        .btn-clear {
            background: #444;
            color: white;
        }
        
        .btn-clear:hover {
            background: #666;
        }

        .btn-download-png {
            background: #0066cc;
            color: white;
        }

        .btn-download-jpg {
            background: #e68a00;
            color: white;
        }
        
        .error, .success {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
            font-weight: bold;
        }
        
        .error { background: rgba(90, 16, 16, 0.9); color: #ff9999; border-left: 4px solid #ff0000; }
        .success { background: rgba(16, 74, 32, 0.9); color: #99ffaa; border-left: 4px solid #00ff00; }
        .show { display: block; }
        
        .table-section {
            display: none;
            margin-bottom: 50px;
        }
        
        .table-section.active {
            display: block;
        }

        /* Customization Controls UI */
        .custom-controls {
            background: rgba(20, 20, 20, 0.8);
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            border: 1px solid #444;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-size: 0.85em;
            color: #ccc;
            font-family: 'Roboto', sans-serif;
            font-weight: bold;
        }

        .control-group input[type="range"] {
            width: 100%;
            accent-color: #cc0000;
        }

        .control-group select, .control-group input[type="color"] {
            padding: 5px;
            background: #222;
            color: white;
            border: 1px solid #555;
            border-radius: 3px;
            font-family: inherit;
            width: 100%;
            cursor: pointer;
        }

        .control-group input[type="color"] {
            height: 35px;
            padding: 2px;
        }

        .hint-text {
            color: #aaa;
            font-size: 0.9em;
            text-align: center;
            margin-top: 15px;
            margin-bottom: 10px;
            font-family: 'Roboto', sans-serif;
        }
        
        /* Capture area */
        #captureArea {
            background: #050000;
            padding: 15px 15px 25px 15px; 
            margin: 0 auto;
            border-radius: 5px;
            resize: horizontal; 
            overflow: auto;
            min-width: 600px;
            max-width: 100%;
            border: 2px dashed #888; 
        }

        #captureArea.downloading {
            border: none;
            resize: none;
            overflow: visible !important;
            padding: 15px; 
        }

        /* Table wrapper */
        .table-wrapper {
            border: var(--border-thickness) solid var(--outer-border-color);
            box-shadow: 0 0 15px var(--outer-border-color);
            border-radius: 4px;
            overflow: hidden;
            height: auto;
        }

        table {
            width: 100%;
            height: auto; 
            border-collapse: collapse;
            font-family: var(--table-font-family);
            table-layout: fixed; 
            background: #000;
        }
        
        th, td {
            border: var(--border-thickness) solid var(--inner-border-color); 
            text-align: center;
            padding: var(--cell-pad-y) var(--cell-pad-x); 
            vertical-align: middle; 
            font-size: var(--table-font-size);
            font-weight: var(--table-font-weight);
        }

        th {
            white-space: nowrap; 
            font-family: 'Oswald', sans-serif; 
        }
        
        /* Header Styling */
        .title-header {
            font-size: calc(var(--table-font-size) * 2); 
            font-style: italic;
            font-weight: 700;
            background: #000;
            color: #fff;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: var(--cell-pad-y); 
            border-bottom: calc(var(--border-thickness) * 2) solid var(--inner-border-color) !important;
            cursor: pointer;
        }
        
        .red-header {
            background: linear-gradient(to bottom, var(--header-red-bg), #500000);
            color: white;
            font-weight: 700;
            letter-spacing: 1px;
            padding: calc(var(--cell-pad-y) * 0.8) var(--cell-pad-x); 
        }
        
        .black-header {
            background: #000;
            color: #fff;
            font-weight: 700;
            padding: calc(var(--cell-pad-y) * 0.8) var(--cell-pad-x);
        }
        
        /* Body Styling */
        tbody tr {
            background: #050505;
        }
        
        .match-cell {
            text-align: left;
            padding-left: 20px;
            font-weight: var(--table-font-weight);
            font-size: var(--table-font-size);
            white-space: normal;
            line-height: 1.4;
            color: #fff;
            font-family: var(--table-font-family);
        }
        
        .code-cell {
            color: #ffcc00; 
            font-weight: var(--table-font-weight);
            font-size: var(--table-font-size);
        }

        .date-time-cell {
            color: #fff; 
            font-weight: var(--table-font-weight);
            font-size: var(--table-font-size);
        }

        .odds {
            color: #ffcc00; 
            font-weight: var(--table-font-weight);
            font-size: var(--table-font-size);
        }

        .controls {
            margin-bottom: 15px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <!-- Data Input Section -->
        <div class="input-section">
            <h2>📋 Data Input</h2>
            
            <div class="error" id="errorMessage"></div>
            <div class="success" id="successMessage"></div>
            
            <p><strong>Copy your data below and paste it here:</strong></p>
            
            <div class="info-box">
                <p><strong>Format (7 Columns):</strong> CODE | DATE | TIME | MATCH | 1 | X | 2</p>
                <p><strong>Format (6 Columns):</strong> CODE | DATE | TIME | MATCH | 1 | 2</p>
            </div>
            
            <textarea id="dataInput" placeholder="0258|15.05|23:00|Aston Villa - Liverpool FC|2.95|3.8|1.76
0336|16.05|18:00|Chelsea FC - Manchester City|4.5|3.4|1.76
1541|01.12|17:30|Bayern Munich - FC Cologne|1.15|9.4|13
1676|17.05|21:00|Sevilla FC - Real Madrid|3.2|3.55|2.2
0280|17.05|21:00|Atletico Madrid - Girona FC|1.75|3.9|4.5
0387|17.05|15:30|Manchester United - Nottingham Forest|1.6|4.4|5
0325|18.05|23:00|Arsenal FC - Burnley FC|1.1|10|24
1201|19.05|23:15|Chelsea FC - Tottenham Hotspur|2.01|3.6|3.15"></textarea>
            
            <div class="button-group">
                <button class="btn btn-generate" onclick="generateTable()">🔄 Generate Table</button>
                <button class="btn btn-clear" onclick="clearData()">Clear</button>
            </div>
        </div>
        
        <!-- Table Section -->
        <div class="table-section" id="tableSection">
            
            <!-- Advanced Customization Controls -->
            <div class="custom-controls">
                <!-- Font Size -->
                <div class="control-group">
                    <label for="fontSizeSlider">Font Size</label>
                    <input type="range" id="fontSizeSlider" min="0.8" max="1.6" step="0.05" value="1.1">
                </div>
                <!-- Vertical Padding (Height) -->
                <div class="control-group">
                    <label for="padYSlider">Row Padding (Vertical)</label>
                    <input type="range" id="padYSlider" min="2" max="30" step="1" value="12">
                </div>
                <!-- Horizontal Padding (Width Spacing) -->
                <div class="control-group">
                    <label for="padXSlider">Cell Padding (Horizontal)</label>
                    <input type="range" id="padXSlider" min="2" max="30" step="1" value="14">
                </div>
                <!-- Border Thickness -->
                <div class="control-group">
                    <label for="borderSlider">Border Thickness</label>
                    <input type="range" id="borderSlider" min="0" max="5" step="1" value="1">
                </div>
                <!-- Header Color -->
                <div class="control-group">
                    <label for="headerColorPicker">Header Color</label>
                    <input type="color" id="headerColorPicker" value="#a00000">
                </div>
                <!-- Inner Border Color -->
                <div class="control-group">
                    <label for="innerBorderColorPicker">Inner Border Color</label>
                    <input type="color" id="innerBorderColorPicker" value="#444444">
                </div>
                <!-- Outer Border Color -->
                <div class="control-group">
                    <label for="outerBorderColorPicker">Outer Border Color (Glow)</label>
                    <input type="color" id="outerBorderColorPicker" value="#ff0000">
                </div>
                <!-- Font Style -->
                <div class="control-group">
                    <label for="fontFamilySelect">Font Style</label>
                    <select id="fontFamilySelect">
                        <option value="'Roboto', sans-serif">Roboto (Normal)</option>
                        <option value="'Oswald', sans-serif">Oswald (Sporty)</option>
                        <option value="'Anton', sans-serif">Anton (Very Bold)</option>
                        <option value="'Teko', sans-serif">Teko (Tall & Bold)</option>
                        <option value="'Arial Black', sans-serif">Arial Black (Classic Bold)</option>
                    </select>
                </div>
                <!-- Font Weight -->
                <div class="control-group">
                    <label for="fontWeightSelect">Font Weight</label>
                    <select id="fontWeightSelect">
                        <option value="500">Normal (500)</option>
                        <option value="700" selected>Bold (700)</option>
                        <option value="900">Extra Bold (900)</option>
                    </select>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-download-jpg" onclick="downloadImage('jpg')">⬇️ Download JPG</button>
                <button class="btn btn-download-png" onclick="downloadImage('png')">⬇️ Download PNG</button>
            </div>
            
            <div class="hint-text">💡 Drag the bottom-right corner of the table area to adjust width.</div>

            <!-- Capture area -->
            <div id="captureArea">
                <div class="table-wrapper">
                    <table id="dataTable">
                        <colgroup id="tableColgroup">
                            <!-- Colgroup -->
                        </colgroup>
                        <thead id="tableHead">
                            <!-- Headers -->
                        </thead>
                        <tbody id="tableBody">
                            <!-- Data -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // UI Customization Bindings
        document.getElementById('fontSizeSlider').addEventListener('input', function(e) {
            document.documentElement.style.setProperty('--table-font-size', e.target.value + 'em');
        });
        document.getElementById('padYSlider').addEventListener('input', function(e) {
            document.documentElement.style.setProperty('--cell-pad-y', e.target.value + 'px');
        });
        document.getElementById('padXSlider').addEventListener('input', function(e) {
            document.documentElement.style.setProperty('--cell-pad-x', e.target.value + 'px');
        });
        document.getElementById('borderSlider').addEventListener('input', function(e) {
            document.documentElement.style.setProperty('--border-thickness', e.target.value + 'px');
        });
        document.getElementById('headerColorPicker').addEventListener('input', function(e) {
            document.documentElement.style.setProperty('--header-red-bg', e.target.value);
        });
        document.getElementById('innerBorderColorPicker').addEventListener('input', function(e) {
            document.documentElement.style.setProperty('--inner-border-color', e.target.value);
        });
        document.getElementById('outerBorderColorPicker').addEventListener('input', function(e) {
            document.documentElement.style.setProperty('--outer-border-color', e.target.value);
        });

        document.getElementById('fontFamilySelect').addEventListener('change', function(e) {
            document.documentElement.style.setProperty('--table-font-family', e.target.value);
        });
        document.getElementById('fontWeightSelect').addEventListener('change', function(e) {
            document.documentElement.style.setProperty('--table-font-weight', e.target.value);
        });

        // Generate Table Logic
        function generateTable() {
            const input = document.getElementById('dataInput').value.trim();
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            
            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');
            
            if (!input) {
                errorDiv.textContent = '❌ Please paste your data first!';
                errorDiv.classList.add('show');
                return;
            }
            
            const lines = input.split('\n').filter(line => line.trim());
            const tbody = document.getElementById('tableBody');
            const thead = document.getElementById('tableHead');
            const colgroup = document.getElementById('tableColgroup');
            
            tbody.innerHTML = '';
            
            let validRows = 0;
            let hasX = true; 
            
            // Check number of columns
            for (const line of lines) {
                const testCols = line.split('|').map(col => col.trim());
                if (testCols.length === 6) {
                    hasX = false;
                    break;
                } else if (testCols.length === 7) {
                    hasX = true;
                    break;
                }
            }

            // Create Colgroup
            if (hasX) {
                colgroup.innerHTML = `
                    <col style="width: 12%;">
                    <col style="width: 12%;">
                    <col style="width: 12%;">
                    <col style="width: 34%;"> 
                    <col style="width: 10%;">
                    <col style="width: 10%;">
                    <col style="width: 10%;">
                `;
            } else {
                colgroup.innerHTML = `
                    <col style="width: 14%;">
                    <col style="width: 14%;">
                    <col style="width: 14%;">
                    <col style="width: 38%;"> 
                    <col style="width: 10%;">
                    <col style="width: 10%;">
                `;
            }

            // Create Headers
            const titleText = hasX ? "EUROPEAN TOP LEAGUES" : "WORLD - IPL";
            const colspanVal = hasX ? 7 : 6;
            
            let theadHTML = `
                <tr>
                    <th colspan="${colspanVal}" class="title-header" contenteditable="true" id="mainTitle" title="Click to edit">${titleText}</th>
                </tr>
                <tr>
                    <th class="red-header">CODE</th>
                    <th class="red-header">DATE</th>
                    <th class="red-header">TIME</th>
                    <th class="red-header">MATCH</th>
                    <th class="black-header">1</th>
                    ${hasX ? '<th class="black-header">X</th>' : ''}
                    <th class="black-header">2</th>
                </tr>
            `;
            
            thead.innerHTML = theadHTML;
            
            // Create Rows
            for (const line of lines) {
                const columns = line.split('|').map(col => col.trim());
                const row = document.createElement('tr');
                
                if (hasX && columns.length === 7) {
                    const [code, date, time, match, odd1, oddx, odd2] = columns;
                    const formattedMatch = match.replace(/\s*-\s*/, ' -<br>');
                    
                    row.innerHTML = `
                        <td class="code-cell">${code}</td>
                        <td class="date-time-cell">${date}</td>
                        <td class="date-time-cell">${time}</td>
                        <td class="match-cell">${formattedMatch}</td>
                        <td class="odds">${odd1}</td>
                        <td class="odds">${oddx}</td>
                        <td class="odds">${odd2}</td>
                    `;
                    tbody.appendChild(row);
                    validRows++;
                } else if (!hasX && columns.length === 6) {
                    const [code, date, time, match, odd1, odd2] = columns;
                    const formattedMatch = match.replace(/\s*-\s*/, ' -<br>');

                    row.innerHTML = `
                        <td class="code-cell">${code}</td>
                        <td class="date-time-cell">${date}</td>
                        <td class="date-time-cell">${time}</td>
                        <td class="match-cell">${formattedMatch}</td>
                        <td class="odds">${odd1}</td>
                        <td class="odds">${odd2}</td>
                    `;
                    tbody.appendChild(row);
                    validRows++;
                }
            }
            
            if (validRows === 0) {
                errorDiv.textContent = '❌ No valid data found!';
                errorDiv.classList.add('show');
                return;
            }
            
            document.getElementById('tableSection').classList.add('active');
            successDiv.textContent = `✅ Generated ${validRows} rows successfully!`;
            successDiv.classList.add('show');
            
            setTimeout(() => {
                document.getElementById('tableSection').scrollIntoView({ behavior: 'smooth' });
            }, 100);
        }
        
        // Clear Data
        function clearData() {
            document.getElementById('dataInput').value = '';
            document.getElementById('tableBody').innerHTML = '';
            document.getElementById('tableSection').classList.remove('active');
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('successMessage').classList.remove('show');
        }

        // Download Image
        function downloadImage(format) {
            const captureArea = document.getElementById('captureArea');
            const titleHeader = document.getElementById('mainTitle');
            
            if(titleHeader) titleHeader.blur();

            const prevScrollY = window.scrollY;
            document.documentElement.style.scrollBehavior = 'auto'; 
            window.scrollTo(0, 0);

            captureArea.classList.add('downloading');

            setTimeout(() => {
                // Image quality badhane ke liye scale 4 set kiya gaya hai (High Resolution)
                html2canvas(captureArea, {
                    backgroundColor: '#050000',
                    scale: 4,
                    scrollY: 0,
                    useCORS: true
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `League_Table.${format}`;
                    
                    if (format === 'jpg') {
                        link.href = canvas.toDataURL('image/jpeg', 1.0);
                    } else {
                        link.href = canvas.toDataURL('image/png');
                    }
                    
                    link.click();

                    captureArea.classList.remove('downloading');
                    window.scrollTo(0, prevScrollY);
                    document.documentElement.style.scrollBehavior = ''; 
                });
            }, 150);
        }
    </script>
</body>
</html>
